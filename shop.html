<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --accent: #00d4ff;
    --accent2: #7c3aed;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #64748b;
    --border: rgba(0,212,255,0.15);
    --card-bg: rgba(26,34,53,0.9);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(124,58,237,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(0,212,255,0.06) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,14,26,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
  }
  .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px; font-weight: 700;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; white-space: nowrap;
  }
  .search-wrap { flex: 1; position: relative; }
  .search-input {
    width: 100%; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 8px 14px 8px 36px; color: var(--text);
    font-family: 'Exo 2', sans-serif; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); font-size: 14px; }
  .filter-btn {
    width: 38px; height: 38px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; flex-shrink: 0; transition: border-color 0.2s, background 0.2s;
  }
  .filter-btn:hover, .filter-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.1); }
  .filter-btn svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; stroke-width: 2; }
  .type-scroll { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .type-scroll::-webkit-scrollbar { display: none; }
  .type-tab {
    flex-shrink: 0; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--muted); font-family: 'Exo 2', sans-serif;
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; white-space: nowrap;
    display: flex; align-items: center; gap: 5px;
  }
  .type-tab:hover { border-color: var(--accent); color: var(--accent); }
  .type-tab.active { background: var(--accent); border-color: var(--accent); color: #0a0e1a; font-weight: 600; }
  .tab-icon { font-size: 14px; line-height: 1; }
  .filter-panel {
    position: fixed; top: 0; right: -100%;
    width: min(320px, 90vw); height: 100vh;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 200; transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
    overflow-y: auto; padding: 20px;
  }
  .filter-panel.open { right: 0; }
  .filter-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    z-index: 199; display: none; backdrop-filter: blur(4px);
  }
  .filter-overlay.open { display: block; }
  .filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .filter-title { font-family: 'Rajdhani', sans-serif; font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: 1px; }
  .close-btn {
    width: 32px; height: 32px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; color: var(--muted); font-size: 18px; transition: color 0.2s;
  }
  .close-btn:hover { color: var(--text); }
  .filter-section { margin-bottom: 24px; }
  .filter-section-title {
    font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 600;
    letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
  }
  .sort-btn {
    width: 100%; padding: 12px 16px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px; color: var(--text);
    font-family: 'Exo 2', sans-serif; font-size: 14px; text-align: left;
    cursor: pointer; margin-bottom: 8px; display: flex; align-items: center;
    gap: 10px; transition: all 0.2s;
  }
  .sort-btn:hover { border-color: var(--accent); }
  .sort-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.1); color: var(--accent); }
  .sort-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
  .type-filter-btn {
    width: 100%; padding: 11px 16px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: 10px; color: var(--text);
    font-family: 'Exo 2', sans-serif; font-size: 14px; text-align: left;
    cursor: pointer; margin-bottom: 8px; display: flex; align-items: center;
    gap: 10px; transition: all 0.2s;
  }
  .type-filter-btn:hover { border-color: var(--accent); }
  .type-filter-btn.active { border-color: var(--accent); background: rgba(0,212,255,0.1); color: var(--accent); }
  .type-filter-icon { font-size: 18px; line-height: 1; flex-shrink: 0; }
  .type-filter-count { margin-left: auto; font-size: 12px; color: var(--muted); }
  .filter-divider { height: 1px; background: var(--border); margin: 16px 0; }
  .main { padding: 16px; position: relative; z-index: 1; }
  .count-bar { font-size: 12px; color: var(--muted); margin-bottom: 12px; font-weight: 500; }
  .count-bar span { color: var(--accent); }
  .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
  @media(min-width: 480px) { .grid { grid-template-columns: repeat(3, 1fr); } }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px; overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    opacity: 0; transform: translateY(16px);
    transition: opacity 0.35s ease, transform 0.35s ease, border-color 0.2s;
  }
  .card.visible { opacity: 1; transform: translateY(0); }
  .card:hover { border-color: rgba(0,212,255,0.4); }

  /* IMAGE SKELETON + lazy */
  .card-img-wrap {
    width: 100%; aspect-ratio: 1;
    background: var(--bg3);
    position: relative; overflow: hidden;
  }
  .card-img-wrap::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  .card-img-wrap.loaded::after { display: none; }
  @keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }
  .card-img {
    width: 100%; height: 100%;
    object-fit: cover; display: block;
    opacity: 0; transition: opacity 0.3s ease;
    position: absolute; inset: 0;
  }
  .card-img.loaded { opacity: 1; }
  .card-img-placeholder {
    width: 100%; aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    font-size: 40px;
  }
  .card-body { padding: 10px; }
  .card-name {
    font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 600;
    line-height: 1.2; margin-bottom: 6px; color: var(--text);
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  }
  .card-footer { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
  .card-price { font-family: 'Rajdhani', sans-serif; font-size: 15px; font-weight: 700; color: var(--gold); display: flex; align-items: center; gap: 4px; }
  .vbucks-icon { width: 16px; height: 16px; object-fit: contain; flex-shrink: 0; }
  .card-rarity { font-size: 10px; padding: 2px 7px; border-radius: 20px; font-weight: 600; white-space: nowrap; }
  .rarity-common { background: rgba(150,150,150,0.2); color: #9ca3af; }
  .rarity-uncommon { background: rgba(34,197,94,0.2); color: #4ade80; }
  .rarity-rare { background: rgba(59,130,246,0.2); color: #60a5fa; }
  .rarity-epic { background: rgba(168,85,247,0.2); color: #c084fc; }
  .rarity-legendary { background: rgba(245,158,11,0.2); color: #fbbf24; }
  .rarity-mythic { background: rgba(236,72,153,0.2); color: #f472b6; }
  .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 16px; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { color: var(--muted); font-size: 14px; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">⚡ SHOP</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Поиск предметов..." id="searchInput">
    </div>
    <div class="filter-btn" id="filterBtn">
      <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
    </div>
  </div>
  <div class="type-scroll" id="typeTabs"></div>
</div>

<div class="filter-overlay" id="filterOverlay"></div>
<div class="filter-panel" id="filterPanel">
  <div class="filter-header">
    <div class="filter-title">ФИЛЬТРЫ</div>
    <div class="close-btn" id="closeFilter">✕</div>
  </div>
  <div class="filter-section">
    <div class="filter-section-title">Сортировка по цене</div>
    <button class="sort-btn" id="sortAsc" onclick="setSort('asc')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
      От меньшей к большей
    </button>
    <button class="sort-btn" id="sortDesc" onclick="setSort('desc')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="9" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      От большей к меньшей
    </button>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-section">
    <div class="filter-section-title">Тип предмета</div>
    <div id="typeFilters"></div>
  </div>
</div>

<div class="main" id="main">
  <div class="loading">
    <div class="spinner"></div>
    <div class="loading-text">Загружаем магазин...</div>
  </div>
</div>

<script>
const FORTNITE_API_KEY = "";
let allEntries = [];
let currentSort = null;
let currentType = "all";
let searchQuery = "";
let cardObserver = null;
let imgObserver = null;

const TYPE_LABELS = {
  "all":          { label: "Все",       icon: "🛒" },
  "outfit":       { label: "Скины",     icon: "🧍" },
  "pickaxe":      { label: "Кирки",     icon: "⛏️" },
  "vehicle":      { label: "Машины",    icon: "🚗" },
  "wrap":         { label: "Обёртки",   icon: "🎁" },
  "pet":          { label: "Питомцы",   icon: "🐾" },
  "backpack":     { label: "Рюкзаки",   icon: "🎒" },
  "shoes":        { label: "Обувь",     icon: "👟" },
  "glider":       { label: "Планеры",   icon: "🪂" },
  "emote":        { label: "Эмоции",    icon: "💃" },
  "contrail":     { label: "Следы",     icon: "✨" },
  "spray":        { label: "Граффити",  icon: "🎨" },
  "loadingscreen":{ label: "Экраны",    icon: "🖼️" },
  "music":        { label: "Музыка",    icon: "🎵" },
  "toy":          { label: "Игрушки",   icon: "🪀" },
  "bundle":       { label: "Наборы",    icon: "📦" },
};

function setupObservers() {
  // Card visibility animation
  cardObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        e.target.classList.add("visible");
        cardObserver.unobserve(e.target);
      }
    });
  }, { rootMargin: "0px 0px 60px 0px", threshold: 0.05 });

  // Image lazy loading
  imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        const src = img.dataset.src;
        if (src) {
          img.src = src;
          img.onload = () => {
            img.classList.add("loaded");
            img.closest(".card-img-wrap")?.classList.add("loaded");
          };
          img.onerror = () => {
            img.style.display = "none";
            img.closest(".card-img-wrap")?.classList.add("loaded");
          };
        }
        imgObserver.unobserve(img);
      }
    });
  }, { rootMargin: "0px 0px 200px 0px" });
}

async function loadShop() {
  try {
    const headers = {};
    if (FORTNITE_API_KEY) headers["Authorization"] = FORTNITE_API_KEY;
    const r = await fetch("https://fortnite-api.com/v2/shop", { headers });
    const data = await r.json();
    allEntries = data?.data?.entries || [];
    setupObservers();
    buildTypeTabs();
    render();
  } catch(e) {
    document.getElementById("main").innerHTML =
      "<div class='empty'><div class='empty-icon'>⚠️</div><div class='empty-text'>Не удалось загрузить магазин.<br>Проверь подключение.</div></div>";
  }
}

function getItemType(entry) {
  if (entry.bundle) return "bundle";
  const items = entry.items || [];
  if (!items.length) return "other";
  return (items[0]?.type?.backendValue || "").toLowerCase();
}

function getDisplayType(entry) {
  const t = getItemType(entry);
  for (const key of Object.keys(TYPE_LABELS)) {
    if (key !== "all" && t.includes(key)) return key;
  }
  return "other";
}

function buildTypeTabs() {
  const counts = { all: allEntries.length };
  allEntries.forEach(e => { const t = getDisplayType(e); counts[t] = (counts[t]||0)+1; });

  const tabs = document.getElementById("typeTabs");
  const typeFilters = document.getElementById("typeFilters");
  tabs.innerHTML = "";
  typeFilters.innerHTML = "";

  const types = ["all", ...Object.keys(counts).filter(k => k !== "all" && counts[k] > 0)];
  types.forEach(type => {
    const info = TYPE_LABELS[type] || { label: type, icon: "🎮" };
    const count = counts[type] || 0;

    const tab = document.createElement("button");
    tab.className = "type-tab" + (type === currentType ? " active" : "");
    tab.innerHTML = "<span class='tab-icon'>" + info.icon + "</span>" + info.label + " " + count;
    tab.onclick = () => { currentType = type; updateTypeTabs(); render(); };
    tabs.appendChild(tab);

    if (type !== "all") {
      const btn = document.createElement("button");
      btn.className = "type-filter-btn" + (type === currentType ? " active" : "");
      btn.dataset.type = type;
      btn.innerHTML =
        "<span class='type-filter-icon'>" + info.icon + "</span>" +
        "<span>" + info.label + "</span>" +
        "<span class='type-filter-count'>" + count + "</span>";
      btn.onclick = () => { currentType = type; updateTypeTabs(); closeFilter(); render(); };
      typeFilters.appendChild(btn);
    }
  });
}

function updateTypeTabs() {
  const counts = {};
  allEntries.forEach(e => { const t = getDisplayType(e); counts[t] = (counts[t]||0)+1; });
  const types = ["all", ...Object.keys(counts).filter(k => k !== "all")];
  document.querySelectorAll(".type-tab").forEach((tab, i) => {
    tab.classList.toggle("active", types[i] === currentType);
  });
  document.querySelectorAll(".type-filter-btn").forEach(btn => {
    btn.classList.toggle("active", btn.dataset.type === currentType);
  });
}

function setSort(dir) {
  currentSort = currentSort === dir ? null : dir;
  document.getElementById("sortAsc").classList.toggle("active", currentSort === "asc");
  document.getElementById("sortDesc").classList.toggle("active", currentSort === "desc");
  render();
}

function getRarityClass(rarity) {
  const r = (rarity || "").toLowerCase();
  if (r.includes("mythic")) return "rarity-mythic";
  if (r.includes("legendary")) return "rarity-legendary";
  if (r.includes("epic")) return "rarity-epic";
  if (r.includes("rare")) return "rarity-rare";
  if (r.includes("uncommon")) return "rarity-uncommon";
  return "rarity-common";
}

function render() {
  let entries = [...allEntries];
  if (currentType !== "all") entries = entries.filter(e => getDisplayType(e) === currentType);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    entries = entries.filter(e => {
      const item = (e.items || [])[0] || {};
      const name = (e.bundle?.name || item.name || "").toLowerCase();
      return name.includes(q);
    });
  }
  if (currentSort === "asc") entries.sort((a,b) => (a.finalPrice||0) - (b.finalPrice||0));
  if (currentSort === "desc") entries.sort((a,b) => (b.finalPrice||0) - (a.finalPrice||0));

  const main = document.getElementById("main");
  if (!entries.length) {
    main.innerHTML = "<div class='empty'><div class='empty-icon'>🔍</div><div class='empty-text'>Ничего не найдено</div></div>";
    return;
  }

  const frag = document.createDocumentFragment();
  const countBar = document.createElement("div");
  countBar.className = "count-bar";
  countBar.innerHTML = "Показано: <span>" + entries.length + "</span> предметов";
  frag.appendChild(countBar);

  const grid = document.createElement("div");
  grid.className = "grid";

  entries.forEach(entry => {
    const item = (entry.items || [])[0] || {};
    const name = entry.bundle?.name || item.name || "Без названия";
    const price = entry.finalPrice ?? "?";
    const rarity = item.rarity?.displayValue || "";
    const img = entry.bundle?.image || item.images?.featured || item.images?.icon || "";
    const type = getDisplayType(entry);
    const placeholder = (TYPE_LABELS[type] || { icon: "🎮" }).icon;

    const card = document.createElement("div");
    card.className = "card";

    if (img) {
      card.innerHTML =
        "<div class='card-img-wrap'>" +
          "<img class='card-img' data-src='" + img + "' alt=''>" +
        "</div>" +
        "<div class='card-body'>" +
          "<div class='card-name'>" + name + "</div>" +
          "<div class='card-footer'>" +
            "<div class='card-price'><img class='vbucks-icon' src='https://fortnite-api.com/images/vbuck.png' alt='V-Bucks'> " + price + "</div>" +
            (rarity ? "<div class='card-rarity " + getRarityClass(rarity) + "'>" + rarity + "</div>" : "") +
          "</div>" +
        "</div>";
    } else {
      card.innerHTML =
        "<div class='card-img-placeholder'>" + placeholder + "</div>" +
        "<div class='card-body'>" +
          "<div class='card-name'>" + name + "</div>" +
          "<div class='card-footer'>" +
            "<div class='card-price'><img class='vbucks-icon' src='https://fortnite-api.com/images/vbuck.png' alt='V-Bucks'> " + price + "</div>" +
            (rarity ? "<div class='card-rarity " + getRarityClass(rarity) + "'>" + rarity + "</div>" : "") +
          "</div>" +
        "</div>";
    }

    grid.appendChild(card);
  });

  frag.appendChild(grid);
  main.innerHTML = "";
  main.appendChild(frag);

  // Observe all cards and images
  main.querySelectorAll(".card").forEach(card => cardObserver.observe(card));
  main.querySelectorAll(".card-img[data-src]").forEach(img => imgObserver.observe(img));
}

function closeFilter() {
  document.getElementById("filterPanel").classList.remove("open");
  document.getElementById("filterOverlay").classList.remove("open");
  document.getElementById("filterBtn").classList.remove("active");
}

document.getElementById("filterBtn").onclick = () => {
  document.getElementById("filterPanel").classList.add("open");
  document.getElementById("filterOverlay").classList.add("open");
  document.getElementById("filterBtn").classList.add("active");
};
document.getElementById("filterOverlay").onclick = closeFilter;
document.getElementById("closeFilter").onclick = closeFilter;
document.getElementById("searchInput").addEventListener("input", e => {
  searchQuery = e.target.value.trim();
  render();
});

loadShop();
</script>
</body>
</html>
