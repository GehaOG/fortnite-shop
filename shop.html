<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fortnite Item Shop</title>
<link href="https://fonts.googleapis.com/css2?family=Burbank+Big+Condensed:wght@700&family=Rajdhani:wght@500;600;700&family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0d1117;
  --header-bg: rgba(8,10,18,0.97);
  --gold: #f0c040;
  --vbuck: #00d4ff;
  --text: #ffffff;
  --muted: #8899aa;
  --border: rgba(255,255,255,0.08);
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background:
    radial-gradient(ellipse at 20% 0%, rgba(0,80,180,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(100,20,180,0.2) 0%, transparent 55%);
  pointer-events: none; z-index: 0;
}

/* ── HEADER ── */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  backdrop-filter: blur(24px);
  padding: 10px 14px 8px;
}
.header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.logo {
  font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase; white-space: nowrap;
  color: #fff; text-shadow: 0 0 20px rgba(0,180,255,0.6);
}
.logo span { color: #00d4ff; }
.search-wrap { flex: 1; position: relative; }
.search-input {
  width: 100%; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  padding: 7px 12px 7px 34px; color: #fff;
  font-family: 'Exo 2', sans-serif; font-size: 13px; outline: none;
  transition: border-color 0.2s, background 0.2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: rgba(0,212,255,0.5); background: rgba(255,255,255,0.09); }
.search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 13px; opacity: 0.5; }
.filter-btn {
  width: 36px; height: 36px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; flex-shrink: 0; transition: all 0.2s;
}
.filter-btn:hover, .filter-btn.active { border-color: rgba(0,212,255,0.5); background: rgba(0,212,255,0.1); }
.filter-btn svg { width: 16px; height: 16px; stroke: #fff; fill: none; stroke-width: 2; opacity: 0.8; }

.type-scroll { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
.type-scroll::-webkit-scrollbar { display: none; }
.type-tab {
  flex-shrink: 0; padding: 4px 11px; border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.55);
  font-family: 'Exo 2', sans-serif; font-size: 11px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
  text-transform: uppercase; letter-spacing: 0.5px;
  display: flex; align-items: center; gap: 4px;
}
.type-tab:hover { border-color: rgba(255,255,255,0.3); color: #fff; background: rgba(255,255,255,0.08); }
.type-tab.active {
  background: linear-gradient(135deg, #0070cc, #004a99);
  border-color: #0090ff; color: #fff;
  box-shadow: 0 0 12px rgba(0,144,255,0.4);
}
.tab-icon { font-size: 12px; }

/* ── FILTER PANEL ── */
.filter-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 199; display: none; backdrop-filter: blur(4px); }
.filter-overlay.open { display: block; }
.filter-panel {
  position: fixed; top: 0; right: -100%; width: min(300px, 88vw); height: 100vh;
  background: #0d1117; border-left: 1px solid rgba(255,255,255,0.08);
  z-index: 200; transition: right 0.3s cubic-bezier(0.4,0,0.2,1);
  overflow-y: auto; padding: 20px;
}
.filter-panel.open { right: 0; }
.filter-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.filter-title { font-family: 'Rajdhani', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: #00d4ff; }
.close-btn {
  width: 30px; height: 30px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--muted); font-size: 16px; transition: color 0.2s;
}
.close-btn:hover { color: #fff; }
.filter-section { margin-bottom: 22px; }
.filter-section-title {
  font-family: 'Rajdhani', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px;
}
.sort-btn {
  width: 100%; padding: 11px 14px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  color: rgba(255,255,255,0.75); font-family: 'Exo 2', sans-serif; font-size: 13px;
  text-align: left; cursor: pointer; margin-bottom: 6px;
  display: flex; align-items: center; gap: 9px; transition: all 0.15s;
}
.sort-btn:hover { border-color: rgba(0,212,255,0.3); color: #fff; }
.sort-btn.active { border-color: #0090ff; background: rgba(0,144,255,0.12); color: #00d4ff; }
.sort-btn svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
.type-filter-btn {
  width: 100%; padding: 10px 14px; background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
  color: rgba(255,255,255,0.75); font-family: 'Exo 2', sans-serif; font-size: 13px;
  text-align: left; cursor: pointer; margin-bottom: 6px;
  display: flex; align-items: center; gap: 9px; transition: all 0.15s;
}
.type-filter-btn:hover { border-color: rgba(0,212,255,0.3); color: #fff; }
.type-filter-btn.active { border-color: #0090ff; background: rgba(0,144,255,0.12); color: #00d4ff; }
.type-filter-icon { font-size: 16px; flex-shrink: 0; }
.type-filter-count { margin-left: auto; font-size: 11px; color: var(--muted); }
.filter-divider { height: 1px; background: rgba(255,255,255,0.06); margin: 14px 0; }

/* ── LAYOUT ── */
.page-wrap {
  display: flex;
  position: relative; z-index: 1;
}

/* ── LEFT SIDEBAR (section indicators) ── */
.sidebar {
  position: fixed;
  left: 0; top: 50%;
  transform: translateY(-50%);
  z-index: 50;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  padding: 10px 6px;
  background: rgba(0,0,0,0.45);
  border-right: 1px solid rgba(255,255,255,0.06);
  border-radius: 0 10px 10px 0;
  backdrop-filter: blur(10px);
  max-height: 80vh; overflow: hidden;
}
.sidebar-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: rgba(255,255,255,0.2);
  cursor: pointer;
  transition: all 0.25s;
  flex-shrink: 0;
  position: relative;
}
.sidebar-dot:hover { background: rgba(255,255,255,0.6); transform: scale(1.4); }
.sidebar-dot.active {
  background: #00d4ff;
  width: 6px; height: 22px;
  border-radius: 3px;
  box-shadow: 0 0 8px rgba(0,212,255,0.7);
}
.sidebar-dot[title]:hover::after {
  content: attr(title);
  position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
  background: rgba(0,0,0,0.85); color: #fff;
  font-family: 'Exo 2', sans-serif; font-size: 11px; font-weight: 600;
  padding: 3px 8px; border-radius: 4px; white-space: nowrap;
  pointer-events: none; z-index: 999;
  border: 1px solid rgba(255,255,255,0.1);
}

/* ── MAIN ── */
.main {
  flex: 1;
  padding: 14px 12px 14px 22px;
  min-height: calc(100vh - 90px);
}
.count-bar {
  font-size: 11px; color: var(--muted); margin-bottom: 12px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
}
.count-bar span { color: #00d4ff; }

/* ── SECTIONS ── */
.section-block { margin-bottom: 28px; }
.section-title {
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
  letter-spacing: 2px; text-transform: uppercase;
  color: rgba(255,255,255,0.45); margin-bottom: 10px;
  padding-left: 2px;
  display: flex; align-items: center; gap: 8px;
}
.section-title::after {
  content: ''; flex: 1; height: 1px;
  background: rgba(255,255,255,0.07);
}

/* ── GRID ── */
.grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; }
@media(min-width: 420px) { .grid { grid-template-columns: repeat(3, 1fr); } }

/* ── CARD ── */
.card {
  border-radius: 10px; overflow: hidden; cursor: pointer;
  position: relative;
  opacity: 0; transform: translateY(12px);
  transition: opacity 0.3s ease, transform 0.3s ease, box-shadow 0.2s;
  aspect-ratio: 3/4;
}
.card.visible { opacity: 1; transform: translateY(0); }
.card:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 8px 30px rgba(0,0,0,0.6); z-index: 2; }
.card:hover .card-shine { opacity: 1; }

/* rarity backgrounds */
.card.rarity-common    { background: linear-gradient(160deg, #4a4a5a 0%, #2a2a38 100%); }
.card.rarity-uncommon  { background: linear-gradient(160deg, #2d6e3e 0%, #1a3d24 100%); }
.card.rarity-rare      { background: linear-gradient(160deg, #1a4fa0 0%, #0d2d66 100%); }
.card.rarity-epic      { background: linear-gradient(160deg, #6a2fa0 0%, #3d1466 100%); }
.card.rarity-legendary { background: linear-gradient(160deg, #c06010 0%, #7a3800 100%); }
.card.rarity-mythic    { background: linear-gradient(160deg, #c0a010 0%, #806000 100%); }
.card.rarity-icon      { background: linear-gradient(160deg, #1a8fa0 0%, #0a4f60 100%); }
.card.rarity-default   { background: linear-gradient(160deg, #2a3550 0%, #151d30 100%); }

.card-shine {
  position: absolute; inset: 0; opacity: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 60%);
  transition: opacity 0.2s; pointer-events: none; z-index: 3;
}

.card-img {
  width: 100%; height: 100%; object-fit: cover;
  position: absolute; inset: 0; display: block;
  opacity: 0; transition: opacity 0.3s ease;
}
.card-img.loaded { opacity: 1; }

.card-shimmer {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
  background-size: 200% 100%; animation: shimmer 1.4s infinite;
}
.card-img.loaded ~ .card-shimmer { display: none; }
@keyframes shimmer { from { background-position: -200% 0; } to { background-position: 200% 0; } }

.card-overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0.4) 60%, transparent 100%);
  padding: 28px 8px 8px; z-index: 2;
}
.card-name {
  font-family: 'Rajdhani', sans-serif; font-size: 13px; font-weight: 700;
  line-height: 1.2; color: #fff; text-transform: uppercase; letter-spacing: 0.5px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
  margin-bottom: 5px; text-shadow: 0 1px 4px rgba(0,0,0,0.8);
}
.card-footer { display: flex; align-items: center; justify-content: space-between; gap: 4px; }
.card-price {
  display: flex; align-items: center; gap: 4px;
  font-family: 'Rajdhani', sans-serif; font-size: 14px; font-weight: 700;
  color: #fff; background: rgba(0,0,0,0.45);
  padding: 2px 7px 2px 4px; border-radius: 4px;
}
.vbucks-icon { width: 14px; height: 14px; object-fit: contain; flex-shrink: 0; }
.card-type-badge {
  font-size: 9px; font-weight: 700; padding: 2px 5px; border-radius: 3px;
  text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
  background: rgba(255,255,255,0.15); color: rgba(255,255,255,0.85);
}

.card-placeholder {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 44px; opacity: 0.4;
}

/* ── LOADING / EMPTY ── */
.loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; padding: 80px 20px; gap: 16px;
}
.spinner {
  width: 44px; height: 44px;
  border: 3px solid rgba(255,255,255,0.1);
  border-top-color: #00d4ff; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--muted); font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
.empty { text-align: center; padding: 80px 20px; color: var(--muted); }
.empty-icon { font-size: 44px; margin-bottom: 12px; }
.empty-text { font-size: 14px; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">FORTNITE <span>SHOP</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" type="text" placeholder="Поиск предметов..." id="searchInput">
    </div>
    <div class="filter-btn" id="filterBtn">
      <svg viewBox="0 0 24 24"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
    </div>
  </div>
  <div class="type-scroll" id="typeTabs"></div>
</div>

<!-- left sidebar -->
<div class="sidebar" id="sidebar"></div>

<div class="filter-overlay" id="filterOverlay"></div>
<div class="filter-panel" id="filterPanel">
  <div class="filter-header">
    <div class="filter-title">Фильтры</div>
    <div class="close-btn" id="closeFilter">✕</div>
  </div>
  <div class="filter-section">
    <div class="filter-section-title">Сортировка по цене</div>
    <button class="sort-btn" id="sortAsc" onclick="setSort('asc')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="9" y2="18"/></svg>
      От меньшей к большей
    </button>
    <button class="sort-btn" id="sortDesc" onclick="setSort('desc')">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="9" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      От большей к меньшей
    </button>
  </div>
  <div class="filter-divider"></div>
  <div class="filter-section">
    <div class="filter-section-title">Тип предмета</div>
    <div id="typeFilters"></div>
  </div>
</div>

<div class="page-wrap">
  <div class="main" id="main">
    <div class="loading">
      <div class="spinner"></div>
      <div class="loading-text">Загружаем магазин...</div>
    </div>
  </div>
</div>

<script>
const GITHUB_USER = "GehaOG";
const GITHUB_REPO = "fortnite-shop";
const SHOP_DATA_URL = "https://raw.githubusercontent.com/" + GITHUB_USER + "/" + GITHUB_REPO + "/main/shop_data.json";

let allEntries = [];
let currentSort = null;
let currentType = "all";
let searchQuery = "";
let cardObserver = null;
let imgObserver = null;
let sectionEls = [];

const TYPE_LABELS = {
  "all":           { label: "Все",       icon: "🛒" },
  "outfit":        { label: "Скины",     icon: "🧍" },
  "pickaxe":       { label: "Кирки",     icon: "⛏️" },
  "vehicle":       { label: "Машины",    icon: "🚗" },
  "wrap":          { label: "Обёртки",   icon: "🎁" },
  "pet":           { label: "Питомцы",   icon: "🐾" },
  "backpack":      { label: "Рюкзаки",   icon: "🎒" },
  "shoes":         { label: "Обувь",     icon: "👟" },
  "glider":        { label: "Планеры",   icon: "🪂" },
  "emote":         { label: "Эмоции",    icon: "💃" },
  "contrail":      { label: "Следы",     icon: "✨" },
  "spray":         { label: "Граффити",  icon: "🎨" },
  "loadingscreen": { label: "Экраны",    icon: "🖼️" },
  "music":         { label: "Музыка",    icon: "🎵" },
  "toy":           { label: "Игрушки",   icon: "🪀" },
  "bundle":        { label: "Наборы",    icon: "📦" },
  "other":         { label: "Прочее",    icon: "🎮" },
};

const RARITY_CLASS = {
  "mythic": "rarity-mythic", "legendary": "rarity-legendary",
  "epic": "rarity-epic", "rare": "rarity-rare",
  "uncommon": "rarity-uncommon", "common": "rarity-common",
  "icon": "rarity-icon",
};

function getRarityClass(rarity) {
  const r = (rarity || "").toLowerCase();
  for (const [key, cls] of Object.entries(RARITY_CLASS)) {
    if (r.includes(key)) return cls;
  }
  return "rarity-default";
}

function getDisplayType(entry) {
  const t = (entry.type || "").toLowerCase();
  for (const key of Object.keys(TYPE_LABELS)) {
    if (key !== "all" && key !== "other" && t.includes(key)) return key;
  }
  return "other";
}

function setupObservers() {
  cardObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add("visible"); cardObserver.unobserve(e.target); }
    });
  }, { rootMargin: "0px 0px 80px 0px", threshold: 0.05 });

  imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        if (img.dataset.src) {
          img.src = img.dataset.src;
          img.onload = () => img.classList.add("loaded");
          img.onerror = () => { img.style.display = "none"; };
        }
        imgObserver.unobserve(img);
      }
    });
  }, { rootMargin: "0px 0px 800px 0px" });
}

// ── SIDEBAR ──
function buildSidebar(sections) {
  const sidebar = document.getElementById("sidebar");
  sidebar.innerHTML = "";
  sectionEls = [];

  sections.forEach((sec, i) => {
    const dot = document.createElement("div");
    dot.className = "sidebar-dot" + (i === 0 ? " active" : "");
    dot.title = sec.label;
    dot.dataset.index = i;
    dot.onclick = () => {
      const el = document.getElementById("section-" + i);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    };
    sidebar.appendChild(dot);
    sectionEls.push(dot);
  });

  // scroll observer for active dot
  const secObserver = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const idx = parseInt(e.target.dataset.sectionIndex);
        sectionEls.forEach((d, i) => d.classList.toggle("active", i === idx));
      }
    });
  }, { rootMargin: "-40% 0px -55% 0px", threshold: 0 });

  document.querySelectorAll(".section-block").forEach(el => secObserver.observe(el));
}

async function loadShop() {
  try {
    const r = await fetch(SHOP_DATA_URL + "?t=" + Date.now());
    if (!r.ok) throw new Error("no data");
    allEntries = await r.json();
    allEntries = allEntries.filter(e => e.name && e.name !== "Без названия" && e.img);
    setupObservers();
    buildTypeTabs();
    render();
  } catch(e) {
    document.getElementById("main").innerHTML =
      "<div class='empty'><div class='empty-icon'>⚠️</div><div class='empty-text'>Магазин ещё не загружен ботом.<br>Напиши боту /shop чтобы обновить.</div></div>";
  }
}

function scrollToType(type) {
  if (type === "all") {
    window.scrollTo({ top: 0, behavior: "smooth" });
    return;
  }
  const blocks = document.querySelectorAll(".section-block");
  for (const block of blocks) {
    if (block.dataset.type === type) {
      const headerH = document.querySelector(".header").offsetHeight;
      const top = block.getBoundingClientRect().top + window.scrollY - headerH - 8;
      window.scrollTo({ top, behavior: "smooth" });
      return;
    }
  }
}

function buildTypeTabs() {
  const counts = { all: allEntries.length };
  allEntries.forEach(e => { const t = getDisplayType(e); counts[t] = (counts[t]||0)+1; });

  const sectionOrder = ["outfit","pickaxe","emote","backpack","glider","wrap","spray","contrail","loadingscreen","toy","vehicle","pet","shoes","bundle","other","music"];
  const tabs = document.getElementById("typeTabs");
  const typeFilters = document.getElementById("typeFilters");
  tabs.innerHTML = ""; typeFilters.innerHTML = "";

  const types = ["all", ...sectionOrder.filter(k => counts[k] > 0), ...Object.keys(counts).filter(k => k !== "all" && !sectionOrder.includes(k) && counts[k] > 0)];
  types.forEach(type => {
    const info = TYPE_LABELS[type] || { label: type, icon: "🎮" };
    const count = counts[type] || 0;

    const tab = document.createElement("button");
    tab.className = "type-tab";
    tab.dataset.type = type;
    tab.innerHTML = "<span class='tab-icon'>" + info.icon + "</span>" + info.label + " " + count;
    tab.onclick = () => { scrollToType(type); };
    tabs.appendChild(tab);

    if (type !== "all") {
      const btn = document.createElement("button");
      btn.className = "type-filter-btn";
      btn.dataset.type = type;
      btn.innerHTML = "<span class='type-filter-icon'>" + info.icon + "</span><span>" + info.label + "</span><span class='type-filter-count'>" + count + "</span>";
      btn.onclick = () => { closeFilter(); scrollToType(type); };
      typeFilters.appendChild(btn);
    }
  });
}

function updateTypeTabs() {}

function setSort(dir) {
  currentSort = currentSort === dir ? null : dir;
  document.getElementById("sortAsc").classList.toggle("active", currentSort === "asc");
  document.getElementById("sortDesc").classList.toggle("active", currentSort === "desc");
  render();
}

function render() {
  let entries = [...allEntries];
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    entries = entries.filter(e => (e.name || "").toLowerCase().includes(q));
  }
  if (currentSort === "asc") entries.sort((a,b) => (a.price||0) - (b.price||0));
  if (currentSort === "desc") entries.sort((a,b) => (b.price||0) - (a.price||0));

  const main = document.getElementById("main");
  if (!entries.length) {
    document.getElementById("sidebar").innerHTML = "";
    main.innerHTML = "<div class='empty'><div class='empty-icon'>🔍</div><div class='empty-text'>Ничего не найдено</div></div>";
    return;
  }

  // group by type for sections
  const grouped = {};
  entries.forEach(e => {
    const t = getDisplayType(e);
    if (!grouped[t]) grouped[t] = [];
    grouped[t].push(e);
  });

  const sectionOrder = ["outfit","pickaxe","emote","backpack","glider","wrap","spray","contrail","loadingscreen","toy","vehicle","pet","shoes","bundle","other","music"];
  const orderedKeys = [...sectionOrder.filter(k => grouped[k]), ...Object.keys(grouped).filter(k => !sectionOrder.includes(k))];

  const frag = document.createDocumentFragment();

  const countBar = document.createElement("div");
  countBar.className = "count-bar";
  countBar.innerHTML = "Показано: <span>" + entries.length + "</span> предметов";
  frag.appendChild(countBar);

  const sections = [];

  orderedKeys.forEach((type, secIdx) => {
    const items = grouped[type];
    const info = TYPE_LABELS[type] || { label: type, icon: "🎮" };

    const block = document.createElement("div");
    block.className = "section-block";
    block.id = "section-" + secIdx;
    block.dataset.sectionIndex = secIdx;
    block.dataset.type = type;

    const title = document.createElement("div");
    title.className = "section-title";
    title.textContent = info.icon + " " + info.label.toUpperCase();
    block.appendChild(title);

    const grid = document.createElement("div");
    grid.className = "grid";

    items.forEach(entry => {
      const name = entry.name || "";
      const price = entry.price ?? "?";
      const rarity = entry.rarity || "";
      const img = entry.img || "";
      const rarCls = getRarityClass(rarity);
      const typeInfo = TYPE_LABELS[getDisplayType(entry)] || { icon: "🎮", label: "Предмет" };

      const card = document.createElement("div");
      card.className = "card " + rarCls;

      card.innerHTML =
        "<div class='card-shine'></div>" +
        (img ? "<img class='card-img' data-src='" + img + "' alt=''><div class='card-shimmer'></div>" : "<div class='card-placeholder'>" + typeInfo.icon + "</div>") +
        "<div class='card-overlay'>" +
          "<div class='card-name'>" + name + "</div>" +
          "<div class='card-footer'>" +
            "<div class='card-price'><img class='vbucks-icon' src='https://fortnite-api.com/images/vbuck.png' alt=''> " + price + "</div>" +
            "<div class='card-type-badge'>" + typeInfo.label + "</div>" +
          "</div>" +
        "</div>";

      grid.appendChild(card);
    });

    block.appendChild(grid);
    frag.appendChild(block);
    sections.push({ label: info.icon + " " + info.label });
  });

  main.innerHTML = "";
  main.appendChild(frag);

  main.querySelectorAll(".card").forEach(card => cardObserver.observe(card));
  main.querySelectorAll(".card-img[data-src]").forEach(img => imgObserver.observe(img));

  buildSidebar(sections);
}

function closeFilter() {
  document.getElementById("filterPanel").classList.remove("open");
  document.getElementById("filterOverlay").classList.remove("open");
  document.getElementById("filterBtn").classList.remove("active");
}

document.getElementById("filterBtn").onclick = () => {
  document.getElementById("filterPanel").classList.add("open");
  document.getElementById("filterOverlay").classList.add("open");
  document.getElementById("filterBtn").classList.add("active");
};
document.getElementById("filterOverlay").onclick = closeFilter;
document.getElementById("closeFilter").onclick = closeFilter;
document.getElementById("searchInput").addEventListener("input", e => { searchQuery = e.target.value.trim(); render(); });

loadShop();
</script>
</body>
</html>
